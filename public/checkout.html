<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido | Baker & Co.</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .step-hidden { display: none; }
        .form-control { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        .active-step { color: black !important; font-weight: bold; border-bottom: 2px solid #c5a059; }
        .summary-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .summary-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; }
        .btn-black:disabled { background: #666; cursor: not-allowed; }
        .btn-eliminar { background: none; border: none; color: #d9534f; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; padding: 0; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1100px; margin: auto; padding: 50px 20px;">
        <div class="logo" onclick="window.location.href='index.html'" style="text-align: center; margin-bottom: 40px; font-size: 2rem; cursor:pointer;">BAKER & CO.</div>

        <div class="step-indicator" style="display: flex; gap: 40px; justify-content: center; margin-bottom: 50px; color: #bbb; font-size: 0.85rem; letter-spacing: 1px;">
            <span id="ind-1" class="active-step">01 MI PEDIDO</span>
            <span id="ind-2">02 ENVÍO</span>
            <span id="ind-3">03 PAGO</span>
        </div>

        <div class="checkout-layout" style="display: grid; grid-template-columns: 1.6fr 1fr; gap: 60px;">
            <div id="steps-container">
                <div id="step-1">
                    <h3 style="margin-bottom: 25px;">Revisa tu pedido</h3>
                    <div id="checkout-list"></div> <button class="btn-black" onclick="changeStep(2)" style="margin-top: 30px;">CONTINUAR AL ENVÍO</button>
                    <a href="index.html" style="display: block; margin-top: 15px; font-size: 0.8rem; color: #888;">Seguir comprando</a>
                </div>

                <div id="step-2" class="step-hidden">
                    <h3 style="margin-bottom: 25px;">Dirección de envío</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" id="nombre-envio" placeholder="Nombre" class="form-control">
                        <input type="text" id="apellidos-envio" placeholder="Apellidos" class="form-control">
                        <input type="text" id="direccion" placeholder="Calle, número..." class="form-control" style="grid-column: span 2;">
                        <input type="text" id="cp" placeholder="CP (5 dígitos)" class="form-control" maxlength="5">
                        <input type="text" id="ciudad" placeholder="Ciudad" class="form-control">
                    </div>
                    <button class="btn-black" onclick="changeStep(3)" style="margin-top: 30px;">CONTINUAR AL PAGO</button>
                    <p onclick="changeStep(1)" style="cursor:pointer; text-decoration: underline; font-size: 0.8rem; margin-top: 20px; color: #888;">Volver al carrito</p>
                </div>

                <div id="step-3" class="step-hidden">
                    <h3 style="margin-bottom: 25px;">Método de Pago</h3>
                    <div style="border: 1px solid #000; padding: 25px; margin-bottom: 20px; background: #fff;">
                        <label style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 10px;">TARJETA DE CRÉDITO</label>
                        <input type="text" id="tarjeta-num" placeholder="0000 0000 0000 0000" class="form-control" maxlength="19">
                        <div style="display: flex; gap: 15px;">
                            <input type="text" id="tarjeta-exp" placeholder="MM/AA" class="form-control" maxlength="5">
                            <input type="text" id="tarjeta-cvv" placeholder="CVV" class="form-control" maxlength="3">
                        </div>
                    </div>
                    <button class="btn-black" onclick="finalizarCompra()">PAGAR AHORA</button>
                    <p onclick="changeStep(2)" style="cursor:pointer; text-decoration: underline; font-size: 0.8rem; margin-top: 20px; color: #888;">Volver a envío</p>
                </div>
            </div>

            <aside class="summary-card" style="background: #fff; padding: 35px; border: 1px solid #f0f0f0; height: fit-content;">
                <h4 style="margin-top: 0; letter-spacing: 1px;">RESUMEN</h4>
                <div id="side-summary"></div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem;">
                    <span>TOTAL</span>
                    <span id="total-price">0.00€</span>
                </div>
            </aside>
        </div>
    </div>

    <script>
        function renderCheckout() {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const list = document.getElementById('checkout-list');
            const side = document.getElementById('side-summary');
            const totalPriceElement = document.getElementById('total-price');

            if (carrito.length === 0) {
                list.innerHTML = "<p>Tu carrito está vacío.</p>";
                side.innerHTML = "<p>No hay productos.</p>";
                totalPriceElement.innerText = "0.00€";
                return;
            }

            let htmlContent = "";
            let total = 0;

            // RECORREMOS TODO EL ARRAY
            carrito.forEach((item, index) => {
                total += parseFloat(item.precio);
                htmlContent += `
                    <div class="summary-item">
                        <img src="${item.imagen}" onerror="this.src='images/default.png'">
                        <div style="flex: 1;">
                            <p style="margin: 0; font-weight: 600;">${item.nombre}</p>
                            <p style="margin: 5px 0 0; font-size: 0.75rem; color: #888;">Recogida: ${item.fecha || 'No indicada'}</p>
                            <button class="btn-eliminar" onclick="eliminarProducto(${index})">Eliminar</button>
                        </div>
                        <div style="font-weight: 600;">${item.precio}€</div>
                    </div>
                `;
            });

            list.innerHTML = htmlContent;
            side.innerHTML = htmlContent;
            totalPriceElement.innerText = total.toFixed(2) + "€";
        }

        function eliminarProducto(index) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            renderCheckout();
        }

        function changeStep(step) {
            let carritoActual = JSON.parse(localStorage.getItem('carrito')) || [];
            if (step === 2 && carritoActual.length === 0) {
                alert("El carrito está vacío.");
                return;
            }
            
            // Lógica de validación de campos (omitida aquí para brevedad, pero mantenla igual)
            // ... (Tus validaciones de Step 2 y Step 3) ...

            document.querySelectorAll('#steps-container > div').forEach(div => div.classList.add('step-hidden'));
            document.querySelectorAll('.step-indicator span').forEach(span => span.classList.remove('active-step'));
            document.getElementById('step-' + step).classList.remove('step-hidden');
            document.getElementById('ind-' + step).classList.add('active-step');
        }

        async function finalizarCompra() {
            // Tus validaciones de tarjeta...
            const btn = document.querySelector('#step-3 .btn-black');
            btn.innerText = "PROCESANDO PAGO...";
            btn.disabled = true;
            setTimeout(() => {
                localStorage.removeItem('carrito');
                window.location.href = 'confirmacion.html';
            }, 2000);
        }

        renderCheckout();
    </script>
</body>
</html>
