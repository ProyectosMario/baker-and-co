<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Panel de Obrador | Baker & Co.</title>
        <link rel="stylesheet" href="css/styles.css">
        <style>
            .panel-container {
                max-width: 1100px;
                margin: 50px auto;
                padding: 40px;
                background: white;
                border: 1px solid var(--border-light);
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 30px;
            }
            th, td {
                padding: 15px;
                text-align: left;
                border-bottom: 1px solid var(--border-light);
                font-size: 0.9rem;
            }
            th {
                background-color: var(--bg-soft);
                text-transform: uppercase;
                font-size: 0.75rem;
                letter-spacing: 1px;
            }
            .btn-status {
                padding: 6px 12px;
                font-size: 0.75rem;
                border: 1px solid var(--black);
                background: white;
                color: var(--black);
                cursor: pointer;
                font-weight: 600;
                margin-right: 5px;
                transition: 0.2s;
            }
            .btn-status:hover {
                background: var(--black);
                color: white;
            }
            .btn-nav-back {
                background: none;
                border: 1px solid var(--black);
                padding: 8px 15px;
                font-weight: 600;
                font-size: 0.8rem;
                cursor: pointer;
                margin-right: 20px;
                transition: 0.3s;
            }
            .btn-nav-back:hover {
                background: var(--bg-soft);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo" onclick="window.location.href = 'index.html'" style="cursor:pointer;">BAKER & CO. - OBRADOR</div>
            <nav style="display: flex; align-items: center;">
                <button class="btn-nav-back" onclick="window.location.href = 'index.html'">← VOLVER A LA TIENDA</button>
                <span id="emp-name" style="font-weight: 600; margin-right: 20px;"></span>
                <button id="btn-logout" onclick="logout()" style="background:none; border:none; cursor:pointer;">SALIR</button>
            </nav>
        </header>

        <main class="panel-container">
            <h2>Panel de Producción e Interfaz de Trabajo</h2>
            <p style="color: #666; font-size: 0.9rem;">Visualiza y actualiza las comandas activas asignadas a la cocina.</p>

            <table>
                <thead>
                    <tr>
                        <th>Nº Pedido</th>
                        <th>Cliente</th>
                        <th>Fecha Comanda</th>
                        <th>Estado</th>
                        <th>Acciones de Control</th>
                    </tr>
                </thead>
                <tbody id="tabla-pedidos">
                    <tr>
                        <td><strong>#1024</strong></td>
                        <td>Carlos Mendoza</td>
                        <td>19/05/2026, 14:32</td>
                        <td style="color: var(--gold); font-weight: bold;">En preparación</td>
                        <td>
                            <button class="btn-status" onclick="alert('Estado cambiado a Listo')">Marcar Listo</button>
                            <button class="btn-status" onclick="alert('Pedido Entregado')">Entregar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>

        <script>
            // Control de acceso al panel
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user || (user.rol !== 'empleado' && user.rol !== 'admin')) {
                alert("Acceso denegado. Área exclusiva para personal autorizado.");
                window.location.href = 'login.html';
            } else {
                document.getElementById('emp-name').innerText = `${user.nombre_completo} [${user.rol.toUpperCase()}]`;
            }

            function logout() {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        </script>
    </body>
</html>
