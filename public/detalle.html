<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Producto | Baker & Co.</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .detail-container {
            max-width: 1000px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            display: flex;
            gap: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid var(--border-light);
        }
        .product-image { 
            width: 50%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 4px;
        }
        .product-info { width: 50%; }
        .price { color: var(--gold); font-size: 2rem; margin: 20px 0; font-weight: bold; }
        label { font-size: 0.7rem; letter-spacing: 1px; color: #888; text-transform: uppercase; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1px solid var(--border-light); font-family: inherit; }
        
        .btn-black {
            background: black;
            color: white;
            border: none;
            padding: 15px 30px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-black:hover { background: var(--gold); }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">BAKER & CO.</div>
    </header>

    <div class="detail-container" id="detalle-producto">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let productoActual = null; // Guardamos el objeto aquí para usarlo al comprar

        async function cargarDetalle() {
            if (!productId) {
                document.getElementById('detalle-producto').innerHTML = "<h2>Producto no encontrado</h2>";
                return;
            }

            try {
                const res = await fetch(`/api/productos/${productId}`);
                const result = await res.json();
                
                if (result.status === 'success' && result.data) {
                    productoActual = result.data;
                    const p = productoActual;
                    
                    const rutaImagen = p.imagen_url.startsWith('images/') ? p.imagen_url : `images/${p.imagen_url}`;

                    document.getElementById('detalle-producto').innerHTML = `
                        <img src="${rutaImagen}" class="product-image" onerror="this.src='images/default.png'">
                        <div class="product-info">
                            <label>${p.nombre_categoria || 'Repostería Artesanal'}</label>
                            <h1 id="prod-name">${p.nombre}</h1>
                            <p class="price" id="prod-price">${p.precio_base}€</p>
                            
                            <div style="margin:20px 0;">
                                <label>Fecha de recogida:</label>
                                <input type="datetime-local" id="fecha-recogida">
                                
                                <label>Dedicatoria personalizada:</label>
                                <textarea id="mensaje-pastel" placeholder="¿Quieres añadir un mensaje en el pastel?"></textarea>
                            </div>

                            <button onclick="comprar()" class="btn-black">AÑADIR AL CARRITO</button>
                            <p style="margin-top:20px;"><a href="index.html" style="color:black; font-size:0.8rem; text-decoration:none;">← VOLVER AL CATÁLOGO</a></p>
                        </div>
                    `;
                } else {
                    document.getElementById('detalle-producto').innerHTML = "<h2>Error al cargar el producto</h2>";
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function comprar() {
            const fecha = document.getElementById('fecha-recogida').value;
            const mensaje = document.getElementById('mensaje-pastel').value;

            if (!fecha) {
                alert("Por favor, selecciona una fecha de recogida.");
                return;
            }

            // Creamos el objeto del pedido
            const pedido = {
                id: productId,
                nombre: productoActual.nombre,
                precio: productoActual.precio_base,
                imagen: productoActual.imagen_url.startsWith('images/') ? productoActual.imagen_url : `images/${productoActual.imagen_url}`,
                fecha: fecha,
                mensaje: mensaje,
                cantidad: 1
            };
            
            // 1. Obtener carrito previo o crear uno nuevo (ARRAY)
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

            // 2. Asegurarnos de que el carrito sea un Array (por si había datos viejos mal guardados)
            if (!Array.isArray(carrito)) {
                carrito = [];
            }

            // 3. Añadir el nuevo producto al array
            carrito.push(pedido);

            // 4. Guardar el array completo de nuevo en LocalStorage
            localStorage.setItem('carrito', JSON.stringify(carrito));
            
            alert("¡Añadido correctamente!");
            window.location.href = 'checkout.html';
        }

        cargarDetalle();
    </script>
</body>
</html>
