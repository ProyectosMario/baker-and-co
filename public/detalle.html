<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Producto | Baker & Co.</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .detail-container { max-width: 1000px; margin: 80px auto; background: white; padding: 40px; display: flex; gap: 50px; border: 1px solid var(--border-light); }
        .product-image { width: 50%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info { width: 50%; }
        .price { color: var(--gold); font-size: 2rem; margin: 20px 0; font-weight: bold; }
        label { font-size: 0.7rem; letter-spacing: 1px; color: #888; text-transform: uppercase; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1px solid var(--border-light); font-family: inherit; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">BAKER & CO.</div>
    </header>

    <div class="detail-container" id="detalle-producto"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let productoActual = null;

        async function cargarDetalle() {
            if (!productId) return;
            try {
                const res = await fetch(`/api/productos/${productId}`);
                const result = await res.json();
                if (result.status === 'success') {
                    productoActual = result.data;
                    const p = productoActual;
                    const rutaImagen = p.imagen_url.startsWith('images/') ? p.imagen_url : `images/${p.imagen_url}`;
                    
                    document.getElementById('detalle-producto').innerHTML = `
                        <img src="${p.imagen_url}" alt="${p.nombre}" onerror="this.src='images/default.png'">
                        <div class="product-info">
                            <label>${p.nombre_categoria || 'Pastelería'}</label>
                            <h1 id="prod-name">${p.nombre}</h1>
                            <p class="price">${p.precio_base}€</p>
                            <label>Fecha de recogida:</label>
                            <input type="datetime-local" id="fecha-recogida">
                            <label>Dedicatoria:</label>
                            <textarea id="mensaje-pastel" placeholder="Mensaje..."></textarea>
                            <button onclick="comprar()" class="btn-black">AÑADIR AL CARRITO</button>
                        </div>`;
                }
            } catch (e) { console.error(e); }
        }

        function comprar() {
            const fecha = document.getElementById('fecha-recogida').value;
            if (!fecha) { alert("Elige una fecha"); return; }

            const item = {
                id: productId,
                nombre: productoActual.nombre,
                precio: productoActual.precio_base,
                imagen: productoActual.imagen_url.startsWith('images/') ? productoActual.imagen_url : `images/${productoActual.imagen_url}`,
                fecha: fecha,
                mensaje: document.getElementById('mensaje-pastel').value
            };

            //Recuperar array o crear uno nuevo
            let carrito = JSON.parse(localStorage.getItem('carrito'));
            if (!Array.isArray(carrito)) carrito = []; 

            carrito.push(item);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            
            alert("¡Añadido!");
            window.location.href = 'checkout.html';
        }
        cargarDetalle();
    </script>
</body>
</html>
