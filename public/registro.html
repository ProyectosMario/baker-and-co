<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Registro | Baker & Co.</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="auth-container">
            <div class="logo">BAKER & CO.</div>
            <h2>Crear Cuenta</h2>
            <form id="regForm">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" id="pass" placeholder="Contraseña (mín. 8 caracteres)" required>
                <input type="number" id="anio" placeholder="Año de nacimiento (Ej: 1995)" required>
                <button type="submit" class="btn-black">REGISTRARSE</button>
            </form>
            <p id="mensaje"></p>
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>

        <script>
            document.getElementById('regForm').onsubmit = async (e) => {
                e.preventDefault();
                const mensaje = document.getElementById('mensaje');

                // Estos nombres deben coincidir EXACTAMENTE con los de tu server.js
                const data = {
                    nombre_completo: document.getElementById('nombre').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value,
                    anio_nacimiento: document.getElementById('anio').value
                };

                try {
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    const result = await response.json();

                    mensaje.innerText = result.message;
                    mensaje.style.color = result.status === 'success' ? 'green' : 'red';

                    if (result.status === 'success') {
                        // Si todo va bien, esperamos 2 segundos y mandamos al login
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    }
                } catch (err) {
                    mensaje.innerText = "Error al conectar con el servidor.";
                }
            };
        </script>
    </body>
</html>
