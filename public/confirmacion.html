<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Gracias por tu pedido! | Baker & Co.</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body style="background: #fcfaf7;">

    <div class="auth-container" style="max-width: 650px; margin: 100px auto; text-align: center; background: white; padding: 60px; box-shadow: 0 20px 40px rgba(0,0,0,0.03);">
        <div style="font-size: 5rem; color: #c5a059; margin-bottom: 20px;">✔</div>
        <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px;">¡Pedido Confirmado!</h1>
        <p style="color: #888; margin-bottom: 40px;">Tu solicitud ha sido enviada al obrador. En breve recibirás un email con los detalles.</p>
        
        <div id="ticket" style="text-align: left; background: #fafafa; border: 1px solid #eee; padding: 30px; margin-bottom: 40px; position: relative;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span style="font-weight: 600; letter-spacing: 1px;">BAKER & CO. ENTERPRISE</span>
                <span id="fecha-hoy" style="font-size: 0.8rem; color: #999;"></span>
            </div>
            
            <p style="margin: 5px 0;"><strong>Nº de Pedido:</strong> <span id="order-id"></span></p>
            <p style="margin: 5px 0;"><strong>Estado:</strong> <span style="color: #c5a059;">En preparación</span></p>
            <p style="margin: 5px 0;"><strong>Método:</strong> Recogida en tienda</p>
            
            <div style="border-top: 1px dashed #ccc; margin: 20px 0; padding-top: 20px;">
                <p style="font-size: 0.8rem; color: #666; font-style: italic;">"Gracias por elegir la repostería artesanal de calidad."</p>
            </div>
        </div>

        <button onclick="window.location.href='index.html'" class="btn-black" style="margin-bottom: 15px;">VOLVER A LA TIENDA</button>
        <br>
        <button onclick="window.print()" style="background: none; border: 1px solid #ddd; padding: 12px 25px; cursor: pointer; font-family: inherit; font-size: 0.8rem; letter-spacing: 1px;">
            DESCARGAR RECIBO (PDF)
        </button>
    </div>

    <script>
        // Generar datos ficticios pero realistas para el ticket
        const orderId = 'BC-' + Math.floor(Math.random() * 89999 + 10000);
        document.getElementById('order-id').innerText = orderId;
        
        const hoy = new Date();
        document.getElementById('fecha-hoy').innerText = hoy.toLocaleDateString() + ' ' + hoy.toLocaleTimeString([], {hour: '2-2-digit', minute:'2-2-digit'});
    </script>
</body>
</html>
